# PostgreSQL（techStackPostgres，現成服務型構件）——StatefulSet 單 replica；
# PVC 為獨立資源、掛 helm.sh/resource-policy: keep、名稱固定不含 release 隨機成分：
# helm uninstall 不刪、同名 release 重裝自動續用（solCase#27.3、intTest#80）。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-db-data
  labels:
    {{- include "solkidgal.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.db.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-db
  labels:
    {{- include "solkidgal.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: db
  ports:
    - port: 5432
      targetPort: 5432
---
# StatefulSet 預設 RollingUpdate 即 delete-before-create（先終止舊 pod 才建新 pod），
# 滿足 design paramDbWorkload 之「Recreate 語意」——不會有新舊 pod 互搶 RWO PVC 的死鎖窗口。
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-db
  labels:
    {{- include "solkidgal.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Release.Name }}-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: db
    spec:
      containers:
        - name: postgres
          image: {{ .Values.db.image }}
          env:
            # PGDATA 用子目錄：block 型 StorageClass（如 Longhorn）在卷根留 lost+found 會使 initdb
            # 見非空目錄拒絕初始化；hostPath 型（k3s local-path）無此問題但統一寫法消滅整類故障。
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              value: {{ .Values.db.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.db.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: postgresPassword
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.db.user | quote }}, "-d", {{ .Values.db.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-db-data
