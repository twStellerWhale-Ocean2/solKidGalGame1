{{- if .Values.ingress.enabled }}
# Ingress（issue #329 公網正式部署；design ＜I.C.(D)＞）：預設啟用、預設展開即含（web 可達性 GATE）。
# host 缺值時算出 sollingoworld.<baseDomain>（baseDomain 預設 local，公網部署改自有網域）；
# TLS 兩模式——自架 cert-manager（tls 段＋annotations 供 issuer）／外部邊緣終結（tls 留空）。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-app
  labels:
    {{- include "solkidgal.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | default (printf "sollingoworld.%s" .Values.ingress.baseDomain) }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-app
                port:
                  number: {{ .Values.service.port }}
{{- end }}
