# app 容器（單一 image：遊戲殼＋/admin/＋API）——liveness=/healthz、readiness=/readyz（含 DB 依賴）；
# initContainer 等待資料庫 TCP 就緒（design paramProbes：DB 晚就緒不 CrashLoop 即死）。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
  labels:
    {{- include "solkidgal.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: app
    spec:
      # pod 層 seccomp 一次涵蓋 init 與 app（#317 審查）；db pod 另計（不套硬化，見容器註解）。
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-db
          image: {{ .Values.initImage }}
          command: ["sh", "-c", "until nc -z {{ .Release.Name }}-db 5432; do echo waiting for db; sleep 2; done"]
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ include "solkidgal.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # 硬化僅施於 app／init（design paramAppHardening）；db 容器不套用——官方 postgres image
          # 啟動時以 root 做 initdb 權限調整後自行降權，強制 runAsNonRoot 會破壞初始化。
          # runAsUser 必須給數字（#317 審查 must-fix）：Dockerfile 的 `USER node` 為名字，
          # kubelet 對非數字 image user 無法驗證 non-root、會 CreateContainerConfigError 拒起。
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: postgresPassword
            - name: DATABASE_URL
              value: "postgres://{{ .Values.db.user }}:$(POSTGRES_PASSWORD)@{{ .Release.Name }}-db:5432/{{ .Values.db.database }}"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: sessionSecret
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: adminUsername
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: adminPassword
            {{- if gt (int .Values.api.trustProxy) 0 }}
            # paramTrustProxy（#331）：依實際代理跳數採信 XFF，限流以真實 client IP 計。
            - name: TRUST_PROXY
              value: {{ .Values.api.trustProxy | quote }}
            {{- end }}
          ports:
            - containerPort: 4180
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-app
  labels:
    {{- include "solkidgal.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: app
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 4180
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
