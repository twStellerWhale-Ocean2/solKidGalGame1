<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="Segoe UI, Roboto, sans-serif">
  <!-- 管理帳號頁（分頁「帳號」，登入後預設頁）設計期參考稿：帳號清單表格＋每列操作 -->
  <rect width="640" height="480" fill="#fdf7fa"/>
  <!-- Top App Bar -->
  <rect width="640" height="56" fill="#8c4a60"/>
  <circle cx="28" cy="28" r="12" fill="#f7dce6"/>
  <text x="27" y="33" font-size="14" text-anchor="middle" fill="#8c4a60">👑</text>
  <text x="48" y="34" font-size="16" fill="#ffffff" font-weight="600">Luminara 管理</text>
  <text x="560" y="34" font-size="12" fill="#f2d7df" text-anchor="end">mom01（admin）</text>
  <rect x="572" y="14" width="54" height="28" rx="14" fill="#a96276"/>
  <text x="599" y="33" font-size="12" text-anchor="middle" fill="#ffffff">登出</text>
  <!-- 分頁導覽：帳號（選中）／設定 -->
  <rect x="0" y="56" width="640" height="44" fill="#ffffff"/>
  <text x="60" y="83" font-size="14" text-anchor="middle" fill="#8c4a60" font-weight="600">帳號</text>
  <rect x="24" y="96" width="72" height="4" rx="2" fill="#8c4a60"/>
  <text x="160" y="83" font-size="14" text-anchor="middle" fill="#7a6a6f">設定</text>
  <line x1="0" y1="100" x2="640" y2="100" stroke="#e5d0d7"/>
  <!-- 清單表頭 -->
  <text x="24" y="128" font-size="15" fill="#201a1c" font-weight="600">玩家帳號（4）</text>
  <rect x="16" y="140" width="608" height="30" rx="6" fill="#f4e4ea"/>
  <text x="28" y="160" font-size="11" fill="#5c4a50" font-weight="600">帳號</text>
  <text x="150" y="160" font-size="11" fill="#5c4a50" font-weight="600">建立</text>
  <text x="240" y="160" font-size="11" fill="#5c4a50" font-weight="600">最近登入</text>
  <text x="330" y="160" font-size="11" fill="#5c4a50" font-weight="600">存檔更新</text>
  <text x="418" y="160" font-size="11" fill="#5c4a50" font-weight="600">時長政策</text>
  <text x="520" y="160" font-size="11" fill="#5c4a50" font-weight="600">操作</text>
  <!-- 列 1：admin 自身（無刪除鈕） -->
  <rect x="16" y="174" width="608" height="52" rx="8" fill="#ffffff" stroke="#eadbe0"/>
  <text x="28" y="200" font-size="13" fill="#201a1c" font-weight="600">mom01</text>
  <rect x="28" y="206" width="46" height="14" rx="7" fill="#8c4a60"/>
  <text x="51" y="217" font-size="9" text-anchor="middle" fill="#ffffff">admin</text>
  <text x="150" y="204" font-size="11" fill="#7a6a6f">07-01</text>
  <text x="240" y="204" font-size="11" fill="#7a6a6f">今天 09:12</text>
  <text x="330" y="204" font-size="11" fill="#7a6a6f">－</text>
  <text x="418" y="204" font-size="11" fill="#7a6a6f">－</text>
  <rect x="496" y="178" width="76" height="44" rx="22" fill="#f4e4ea"/>
  <text x="534" y="204" font-size="10.5" text-anchor="middle" fill="#8c4a60">重設密碼</text>
  <!-- 列 2：一般玩家 -->
  <rect x="16" y="232" width="608" height="52" rx="8" fill="#ffffff" stroke="#eadbe0"/>
  <text x="28" y="258" font-size="13" fill="#201a1c" font-weight="600">amy2019</text>
  <rect x="28" y="264" width="46" height="14" rx="7" fill="#e0d0d6"/>
  <text x="51" y="275" font-size="9" text-anchor="middle" fill="#5c4a50">player</text>
  <text x="150" y="262" font-size="11" fill="#7a6a6f">07-02</text>
  <text x="240" y="262" font-size="11" fill="#7a6a6f">昨天 19:40</text>
  <text x="330" y="262" font-size="11" fill="#7a6a6f">昨天 20:05</text>
  <rect x="414" y="248" width="60" height="18" rx="9" fill="#fff0c2"/>
  <text x="444" y="261" font-size="10" text-anchor="middle" fill="#7a5c00">🔒 10/20</text>
  <rect x="496" y="236" width="76" height="44" rx="22" fill="#f4e4ea"/>
  <text x="534" y="262" font-size="10.5" text-anchor="middle" fill="#8c4a60">重設密碼</text>
  <rect x="578" y="236" width="44" height="44" rx="22" fill="#ffffff" stroke="#e5d0d7"/>
  <text x="600" y="264" font-size="16" text-anchor="middle" fill="#5c4a50">⋮</text>
  <!-- 列 3 -->
  <rect x="16" y="290" width="608" height="52" rx="8" fill="#ffffff" stroke="#eadbe0"/>
  <text x="28" y="316" font-size="13" fill="#201a1c" font-weight="600">ben2021</text>
  <rect x="28" y="322" width="46" height="14" rx="7" fill="#e0d0d6"/>
  <text x="51" y="333" font-size="9" text-anchor="middle" fill="#5c4a50">player</text>
  <text x="150" y="320" font-size="11" fill="#7a6a6f">07-02</text>
  <text x="240" y="320" font-size="11" fill="#7a6a6f">今天 08:30</text>
  <text x="330" y="320" font-size="11" fill="#7a6a6f">今天 08:58</text>
  <text x="418" y="320" font-size="11" fill="#7a6a6f">玩家自調</text>
  <rect x="496" y="294" width="76" height="44" rx="22" fill="#f4e4ea"/>
  <text x="534" y="320" font-size="10.5" text-anchor="middle" fill="#8c4a60">重設密碼</text>
  <rect x="578" y="294" width="44" height="44" rx="22" fill="#ffffff" stroke="#e5d0d7"/>
  <text x="600" y="322" font-size="16" text-anchor="middle" fill="#5c4a50">⋮</text>
  <!-- 刪除確認 dialog（error 色、二次確認） -->
  <rect x="0" y="0" width="640" height="480" fill="#201a1c" opacity="0.25"/>
  <rect x="170" y="318" width="300" height="136" rx="16" fill="#ffffff" stroke="#e5d0d7"/>
  <text x="190" y="348" font-size="14" fill="#ba1a1a" font-weight="600">刪除帳號 amy2019？</text>
  <text x="190" y="370" font-size="11" fill="#5c4a50">帳號、存檔與登入狀態將一併刪除，</text>
  <text x="190" y="386" font-size="11" fill="#5c4a50">此操作無法復原。</text>
  <rect x="252" y="398" width="94" height="44" rx="22" fill="#ffffff" stroke="#b39aa2"/>
  <text x="299" y="425" font-size="12" text-anchor="middle" fill="#5c4a50">取消</text>
  <rect x="354" y="398" width="94" height="44" rx="22" fill="#ba1a1a"/>
  <text x="401" y="425" font-size="12" text-anchor="middle" fill="#ffffff">確認刪除</text>
  <text x="320" y="470" font-size="9.5" text-anchor="middle" fill="#b3a3a8">設計期參考稿（page-admin-accounts）·窄視口表格降級為卡片列·以 design.md 文字規格為準</text>
</svg>
