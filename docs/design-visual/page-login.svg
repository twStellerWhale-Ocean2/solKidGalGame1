<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="'Segoe UI','Microsoft JhengHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe3fa"/>
      <stop offset="0.55" stop-color="#fbeaf2"/>
      <stop offset="1" stop-color="#fff7ea"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f28bb4"/>
      <stop offset="1" stop-color="#e06a9a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#b48ab4" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="640" height="480" fill="url(#bg)"/>
  <!-- 裝飾泡泡與星星 -->
  <circle cx="66" cy="84" r="26" fill="#ffffff" opacity="0.35"/>
  <circle cx="590" cy="120" r="18" fill="#ffffff" opacity="0.3"/>
  <circle cx="560" cy="420" r="30" fill="#f7cfe0" opacity="0.4"/>
  <circle cx="90" cy="410" r="16" fill="#d9c4f2" opacity="0.5"/>
  <path d="M598 60 l3.5 8 8 1.2 -6 6 1.6 8.4 -7.1-4.2 -7.1 4.2 1.6-8.4 -6-6 8-1.2z" fill="#f5d98d" opacity="0.85"/>
  <path d="M38 180 l2.6 6 6 0.9 -4.5 4.5 1.2 6.3 -5.3-3.1 -5.3 3.1 1.2-6.3 -4.5-4.5 6-0.9z" fill="#f5d98d" opacity="0.7"/>

  <!-- 標題與皇冠 -->
  <path d="M296 40 l10 14 14-18 14 18 10-14 -4 26 h-40z" fill="#f2c14e" stroke="#d9a53a" stroke-width="2" stroke-linejoin="round"/>
  <text x="320" y="92" text-anchor="middle" font-size="24" font-weight="700" fill="#8a5a7a">Princess English Adventure</text>
  <text x="320" y="112" text-anchor="middle" font-size="13" fill="#a58aa0">選擇你的公主帳號，輸入密碼開始冒險</text>

  <!-- 最近帳號卡列 -->
  <!-- 卡 1（選中） -->
  <g filter="url(#soft)">
    <rect x="96" y="132" width="212" height="104" rx="16" fill="#fbd7e6" opacity="0.92"/>
  </g>
  <rect x="96" y="132" width="212" height="104" rx="16" fill="none" stroke="#e06a9a" stroke-width="3"/>
  <circle cx="140" cy="176" r="26" fill="#fff" opacity="0.9"/>
  <circle cx="140" cy="170" r="11" fill="#e8b98a"/>
  <path d="M126 166 q4 -14 14 -14 q10 0 14 14 q-6 -6 -14 -6 q-8 0 -14 6z" fill="#7a4a2a"/>
  <path d="M120 196 q20 -14 40 0 v4 h-40z" fill="#f28bb4"/>
  <text x="178" y="168" font-size="15" font-weight="700" fill="#7a4a66">mimi</text>
  <text x="178" y="188" font-size="12" fill="#96708a">🪙 120 · Ready</text>
  <text x="178" y="206" font-size="11" fill="#ab8ba0">昨天玩過</text>

  <!-- 卡 2 -->
  <g filter="url(#soft)">
    <rect x="332" y="132" width="212" height="104" rx="16" fill="#d9e6fb" opacity="0.9"/>
  </g>
  <circle cx="376" cy="176" r="26" fill="#fff" opacity="0.9"/>
  <circle cx="376" cy="170" r="11" fill="#e8b98a"/>
  <path d="M362 166 q4 -14 14 -14 q10 0 14 14 q-6 -6 -14 -6 q-8 0 -14 6z" fill="#2a3a7a"/>
  <path d="M356 196 q20 -14 40 0 v4 h-40z" fill="#8aa8e0"/>
  <text x="414" y="168" font-size="15" font-weight="700" fill="#4a5a7a">nana</text>
  <text x="414" y="188" font-size="12" fill="#7086a6">🪙 85 · Rest 05:12</text>
  <text x="414" y="206" font-size="11" fill="#8ba0bb">3 天前玩過</text>

  <!-- 選中卡之密碼欄與進入 -->
  <g filter="url(#soft)">
    <rect x="96" y="252" width="448" height="112" rx="16" fill="#ffffff" opacity="0.92"/>
  </g>
  <text x="120" y="284" font-size="13" fill="#8a5a7a" font-weight="700">mimi 的密碼</text>
  <rect x="120" y="296" width="288" height="44" rx="10" fill="#faf3f7" stroke="#d9b8ca" stroke-width="1.5"/>
  <text x="136" y="325" font-size="20" fill="#8a5a7a" letter-spacing="4">••••••</text>
  <g filter="url(#soft)">
    <rect x="424" y="296" width="96" height="44" rx="22" fill="url(#btn)"/>
  </g>
  <text x="472" y="324" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">進入</text>
  <text x="120" y="356" font-size="11" fill="#c05a7a">密碼不正確時就地紅字提示：帳號或密碼不正確</text>

  <!-- 其他入口（按鈕化，觸控目標 ≥44px） -->
  <g filter="url(#soft)">
    <rect x="106" y="376" width="204" height="44" rx="22" fill="#ece2f7" stroke="#b8a0d8" stroke-width="1.5"/>
    <rect x="330" y="376" width="204" height="44" rx="22" fill="#f7e2ec" stroke="#d8a0bc" stroke-width="1.5"/>
  </g>
  <text x="208" y="404" text-anchor="middle" font-size="14" font-weight="700" fill="#6a5a8a">其他帳號登入</text>
  <text x="432" y="404" text-anchor="middle" font-size="14" font-weight="700" fill="#8a5a72">建立新帳號</text>

  <!-- 舊進度遷移入口（觸控目標 ≥44px） -->
  <g filter="url(#soft)">
    <rect x="160" y="428" width="320" height="44" rx="22" fill="#fdf2d9" stroke="#dcc48a" stroke-width="1.5"/>
  </g>
  <text x="320" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#8a6a3a">✨ 偵測到本機舊進度 — 點此匯入到你的帳號</text>
</svg>
