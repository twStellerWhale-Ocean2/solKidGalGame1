<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="Segoe UI, Roboto, sans-serif">
  <!-- 管理登入頁（/admin/ 未帶有效 admin session）設計期參考稿：MD3 管理網站基座、置中單卡登入 -->
  <rect width="640" height="480" fill="#fdf7fa"/>
  <!-- Top App Bar -->
  <rect width="640" height="56" fill="#8c4a60"/>
  <circle cx="28" cy="28" r="12" fill="#f7dce6"/>
  <text x="27" y="33" font-size="14" text-anchor="middle" fill="#8c4a60">👑</text>
  <text x="48" y="34" font-size="16" fill="#ffffff" font-weight="600">Luminara 管理</text>
  <text x="612" y="34" font-size="12" fill="#f2d7df" text-anchor="end">未登入</text>
  <!-- 置中登入卡 -->
  <rect x="180" y="120" width="280" height="272" rx="16" fill="#ffffff" stroke="#e5d0d7"/>
  <text x="320" y="158" font-size="18" text-anchor="middle" fill="#201a1c" font-weight="600">維護者登入</text>
  <text x="320" y="180" font-size="11" text-anchor="middle" fill="#7a6a6f">僅限管理帳號（admin）</text>
  <!-- 帳號欄 -->
  <text x="204" y="207" font-size="11" fill="#5c4a50">帳號</text>
  <rect x="204" y="214" width="232" height="44" rx="8" fill="#fdf7fa" stroke="#b39aa2"/>
  <text x="216" y="241" font-size="13" fill="#9c8a90">mom01</text>
  <!-- 密碼欄（顯示/隱藏切換） -->
  <text x="204" y="279" font-size="11" fill="#5c4a50">密碼</text>
  <rect x="204" y="286" width="232" height="44" rx="8" fill="#fdf7fa" stroke="#b39aa2"/>
  <text x="216" y="313" font-size="13" fill="#9c8a90">••••••••</text>
  <text x="420" y="313" font-size="13" text-anchor="end" fill="#8c4a60">顯示</text>
  <!-- 錯誤就地提示（統一訊息示意） -->
  <text x="204" y="346" font-size="11" fill="#ba1a1a">帳號或密碼不正確</text>
  <!-- 登入鈕（≥44px 觸控目標） -->
  <rect x="204" y="352" width="232" height="44" rx="22" fill="#8c4a60"/>
  <text x="320" y="379" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="600">登入</text>
  <!-- 註記 -->
  <text x="320" y="418" font-size="10.5" text-anchor="middle" fill="#7a6a6f">玩家帳號登入時顯示「此帳號無管理權限」，不進入管理內容</text>
  <text x="320" y="436" font-size="10.5" text-anchor="middle" fill="#8c4a60">維護者忘記密碼？離線重設方式見產品手冊</text>
  <text x="320" y="464" font-size="9.5" text-anchor="middle" fill="#b3a3a8">設計期參考稿（page-admin-login）·以 design.md 文字規格為準·code 段以實際截圖替換</text>
</svg>
