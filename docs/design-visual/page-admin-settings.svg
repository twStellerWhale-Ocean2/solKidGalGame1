<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="Segoe UI, Roboto, sans-serif">
  <!-- 管理設定頁（分頁「設定」）設計期參考稿：執行期設定表單、儲存即生效 -->
  <rect width="640" height="480" fill="#fdf7fa"/>
  <!-- Top App Bar -->
  <rect width="640" height="56" fill="#8c4a60"/>
  <circle cx="28" cy="28" r="12" fill="#f7dce6"/>
  <text x="27" y="33" font-size="14" text-anchor="middle" fill="#8c4a60">👑</text>
  <text x="48" y="34" font-size="16" fill="#ffffff" font-weight="600">Luminara 管理</text>
  <text x="560" y="34" font-size="12" fill="#f2d7df" text-anchor="end">mom01（admin）</text>
  <rect x="572" y="14" width="54" height="28" rx="14" fill="#a96276"/>
  <text x="599" y="33" font-size="12" text-anchor="middle" fill="#ffffff">登出</text>
  <!-- 分頁導覽：帳號／設定（選中） -->
  <rect x="0" y="56" width="640" height="44" fill="#ffffff"/>
  <text x="60" y="83" font-size="14" text-anchor="middle" fill="#7a6a6f">帳號</text>
  <text x="160" y="83" font-size="14" text-anchor="middle" fill="#8c4a60" font-weight="600">設定</text>
  <rect x="124" y="96" width="72" height="4" rx="2" fill="#8c4a60"/>
  <line x1="0" y1="100" x2="640" y2="100" stroke="#e5d0d7"/>
  <!-- 註冊開關卡 -->
  <rect x="16" y="116" width="608" height="76" rx="12" fill="#ffffff" stroke="#eadbe0"/>
  <text x="32" y="146" font-size="14" fill="#201a1c" font-weight="600">開放新帳號註冊</text>
  <text x="32" y="168" font-size="11" fill="#7a6a6f">關閉後遊戲登入畫面不再提供「建立新帳號」，既有帳號登入不受影響</text>
  <rect x="556" y="138" width="52" height="28" rx="14" fill="#8c4a60"/>
  <circle cx="594" cy="152" r="11" fill="#ffffff"/>
  <!-- 新帳號預設時長卡 -->
  <rect x="16" y="204" width="608" height="150" rx="12" fill="#ffffff" stroke="#eadbe0"/>
  <text x="32" y="234" font-size="14" fill="#201a1c" font-weight="600">新帳號預設遊玩／休息時長</text>
  <text x="32" y="256" font-size="11" fill="#7a6a6f">套用於之後註冊的新帳號；每項限 1–120 分鐘</text>
  <text x="32" y="288" font-size="11" fill="#5c4a50">每次遊玩（分鐘）</text>
  <rect x="32" y="296" width="160" height="44" rx="8" fill="#fdf7fa" stroke="#b39aa2"/>
  <text x="48" y="323" font-size="14" fill="#201a1c">15</text>
  <text x="240" y="288" font-size="11" fill="#5c4a50">每次休息（分鐘）</text>
  <rect x="240" y="296" width="160" height="44" rx="8" fill="#fdf7fa" stroke="#b39aa2"/>
  <text x="256" y="323" font-size="14" fill="#201a1c">15</text>
  <text x="448" y="288" font-size="11" fill="#5c4a50">單回合上限（分鐘）</text>
  <rect x="448" y="296" width="160" height="44" rx="8" fill="#fdf7fa" stroke="#b39aa2"/>
  <text x="464" y="323" font-size="14" fill="#201a1c">20</text>
  <!-- 儲存鈕＋snackbar -->
  <rect x="488" y="370" width="136" height="44" rx="22" fill="#8c4a60"/>
  <text x="556" y="397" font-size="14" text-anchor="middle" fill="#ffffff" font-weight="600">儲存設定</text>
  <rect x="16" y="376" width="248" height="34" rx="8" fill="#322a2d"/>
  <text x="32" y="398" font-size="11.5" fill="#ffffff">✓ 已儲存，設定即時生效</text>
  <!-- 頁尾：版本與職能分界 -->
  <line x1="16" y1="428" x2="624" y2="428" stroke="#e5d0d7"/>
  <text x="16" y="448" font-size="10" fill="#9c8a90">Luminara v0.63.0 ・ 內容編修（題庫、衣物對位、語音）請於開發環境使用管理設定工具，隨版本發行</text>
  <text x="320" y="470" font-size="9.5" text-anchor="middle" fill="#b3a3a8">設計期參考稿（page-admin-settings）·以 design.md 文字規格為準·code 段以實際截圖替換</text>
</svg>
