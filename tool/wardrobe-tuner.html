<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wardrobe Tuner</title>
  <link rel="stylesheet" href="../styles/paper-doll.css">
  <link rel="stylesheet" href="./wardrobe-tuner.css">
</head>
<body>
  <main class="tool-shell">
    <aside class="catalog-pane">
      <header class="tool-header">
        <h1>Wardrobe Tuner</h1>
        <div id="summaryLine" class="summary-line"></div>
      </header>

      <div class="pack-filter">
        <button id="packFilterToggle" type="button" class="pack-toggle">素材包：全部 ▾</button>
        <div id="packFilterMenu" class="pack-menu" hidden>
          <div class="pack-menu-actions">
            <button id="packAll" type="button">全選</button>
            <button id="packNone" type="button">全不選</button>
          </div>
          <div id="packCheckboxes" class="pack-checkboxes"></div>
        </div>
      </div>

      <nav id="categoryTabs" class="category-tabs" aria-label="Wardrobe categories"></nav>
      <section id="itemList" class="item-list" aria-label="Wardrobe items"></section>
    </aside>

    <div class="col-resizer" aria-hidden="true" title="拖曳調整欄寬"></div>

    <section class="preview-pane">
      <div class="preview-stage">
        <div class="figure-frame" aria-hidden="true"></div>
        <div id="previewLabel" class="preview-label"></div>
        <span id="previewDoll" class="paper-doll adv-doll tuner-doll" data-doll="tuner"></span>
        <div id="typeOverlay" class="box-overlay">
          <span class="drag-handle move" data-h="move"></span>
          <span class="drag-handle n" data-h="n"></span><span class="drag-handle s" data-h="s"></span>
          <span class="drag-handle w" data-h="w"></span><span class="drag-handle e" data-h="e"></span>
          <span class="drag-handle nw" data-h="nw"></span><span class="drag-handle ne" data-h="ne"></span>
          <span class="drag-handle sw" data-h="sw"></span><span class="drag-handle se" data-h="se"></span>
        </div>
        <div id="itemOverlay" class="box-overlay">
          <span class="drag-handle move" data-h="move"></span>
          <span class="drag-handle n" data-h="n"></span><span class="drag-handle s" data-h="s"></span>
          <span class="drag-handle w" data-h="w"></span><span class="drag-handle e" data-h="e"></span>
          <span class="drag-handle nw" data-h="nw"></span><span class="drag-handle ne" data-h="ne"></span>
          <span class="drag-handle sw" data-h="sw"></span><span class="drag-handle se" data-h="se"></span>
        </div>
      </div>
    </section>

    <div class="col-resizer col-resizer-right" aria-hidden="true" title="拖曳調整欄寬"></div>

    <aside class="control-pane">
      <div id="selectedInfo" class="selected-info"></div>

      <section class="control-section">
        <h2>編輯對象</h2>
        <div id="modeTabs" class="mode-tabs">
          <button type="button" data-mode="type">① 類型框<span>套同類</span></button>
          <button type="button" data-mode="item">② 單品框<span>僅此件</span></button>
        </div>
        <p id="modeHelp" class="control-help"></p>
        <p class="control-help">在左側預覽圖上直接拖拉所選的框：中央 ✛ 方塊移動、四邊四角 8 點縮放（非等比）。</p>
      </section>

      <section class="control-section apply-section">
        <button id="applyAll" type="button" class="apply-button">✓ 套用到檔案 (Apply)</button>
        <div id="applyStatus" class="apply-status"></div>
        <p class="control-help">寫回 <code>asset-target-overrides.js</code>（單品框）與 <code>rules.js</code>；重新整理遊戲即可看到。</p>
      </section>
    </aside>
  </main>

  <script type="module" src="./wardrobe-tuner.js"></script>
</body>
</html>
