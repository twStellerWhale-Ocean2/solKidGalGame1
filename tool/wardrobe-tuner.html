<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wardrobe Tuner</title>
  <link rel="stylesheet" href="../styles/paper-doll.css">
  <link rel="stylesheet" href="./wardrobe-tuner.css">
</head>
<body>
  <main class="tool-shell">
    <aside class="catalog-pane">
      <header class="tool-header">
        <h1>Wardrobe Tuner</h1>
        <div id="summaryLine" class="summary-line"></div>
      </header>

      <nav id="categoryTabs" class="category-tabs" aria-label="Wardrobe categories"></nav>
      <section id="itemList" class="item-list" aria-label="Wardrobe items"></section>
    </aside>

    <section class="preview-pane">
      <div class="preview-stage">
        <div id="previewLabel" class="preview-label"></div>
        <span id="previewDoll" class="paper-doll adv-doll tuner-doll" data-doll="tuner"></span>
        <div id="typeOverlay" class="type-overlay" aria-hidden="true"></div>
        <div id="itemOverlay" class="item-overlay" aria-hidden="true"></div>
      </div>
    </section>

    <aside class="control-pane">
      <div id="selectedInfo" class="selected-info"></div>

      <section class="control-section">
        <h2>① 類型框 <span class="hint">Type Box · 套同類</span></h2>
        <p class="control-help">此類衣物的投影範圍（= safeBox）；單品框須落在其內，新素材預設投影到這裡。改了影響整個 <code>type</code>。</p>
        <div class="bound-grid">
          <label>Left <input id="safeLeft" type="number" step="1" min="0" max="512"></label>
          <label>Top <input id="safeTop" type="number" step="1" min="0" max="768"></label>
          <label>Right <input id="safeRight" type="number" step="1" min="0" max="512"></label>
          <label>Bottom <input id="safeBottom" type="number" step="1" min="0" max="768"></label>
        </div>
      </section>

      <section class="control-section">
        <h2>② 單品框 <span class="hint">Item Box · 僅此件</span></h2>
        <p class="control-help">這件衣物實際投影到人物的矩形（縮放＋位移）。素材會等比 fit 進此框；只動目前選取的單品。</p>
        <div class="bound-grid">
          <label>Left <input id="itemLeft" type="number" step="1" min="0" max="512"></label>
          <label>Top <input id="itemTop" type="number" step="1" min="0" max="768"></label>
          <label>Right <input id="itemRight" type="number" step="1" min="0" max="512"></label>
          <label>Bottom <input id="itemBottom" type="number" step="1" min="0" max="768"></label>
        </div>
        <div class="nudge-grid">
          <button id="itemUp" type="button">Move Up</button>
          <button id="itemDown" type="button">Move Down</button>
          <button id="itemMoveLeft" type="button">Move Left</button>
          <button id="itemMoveRight" type="button">Move Right</button>
          <button id="itemBigger" type="button">Bigger</button>
          <button id="itemSmaller" type="button">Smaller</button>
          <button id="resetItem" type="button">Reset Item</button>
        </div>
      </section>

      <section class="control-section">
        <h2>Test Image <span class="hint">任意尺寸</span></h2>
        <p class="control-help">載入一張任意尺寸素材，預覽它 fit 進目前單品框的效果（驗證版型不一也能對位）。</p>
        <div class="test-grid">
          <label class="file-button">Load Image<input id="testImage" type="file" accept="image/*"></label>
          <button id="clearTest" type="button">Clear</button>
        </div>
        <div class="reset-grid">
          <button id="resetType" type="button">Reset Type Box</button>
          <button id="resetAll" type="button">Reset All</button>
        </div>
      </section>

      <section class="control-section">
        <h2>Export ① 類型框 <span class="hint">→ rules.js</span></h2>
        <textarea id="outRules" readonly spellcheck="false"></textarea>
        <button id="copyRules" type="button">Copy rules.js safeBox</button>
      </section>

      <section class="control-section">
        <h2>Export ② 單品框覆寫 <span class="hint">→ asset-target-overrides.js</span></h2>
        <textarea id="outOverrides" readonly spellcheck="false"></textarea>
        <button id="copyOverrides" type="button">Copy per-item overrides</button>
      </section>
    </aside>
  </main>

  <script type="module" src="./wardrobe-tuner.js"></script>
</body>
</html>
